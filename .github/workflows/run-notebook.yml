name: Ejecutar Migracion Automatica

on:
  # 1. Configuración del trigger de tiempo (Cron)
  schedule:
    - cron: '0 8 * * *' # Se ejecuta todos los días a las 08:00 AM UTC (Ajusta esto según tu zona horaria)

  # 2. Permite ejecutar el flujo manualmente desde la pestaña "Actions" de GitHub
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
    # Paso A: Descargar el código del repositorio a la máquina virtual
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # Paso B: Configurar Python en la máquina virtual
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Paso C: Instalar Papermill y las dependencias que use tu cuaderno
    # (Reemplaza o añade las librerías que use tu archivo 'MigrarBaseMadre.ipynb')
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install papermill jupyter ipykernel
        pip install pandas sqlalchemy pymysql psycopg2-binary # <-- Agrega aquí las librerías que use tu script de migración

    # Paso D: Ejecutar el cuaderno con Papermill
    - name: Ejecutar el Notebook
      run: |
        papermill MigrarBaseMadre.ipynb resultado_ejecucion.ipynb

    # Paso E: Guardar el resultado para que puedas descargarlo y ver si falló algo
    - name: Subir el notebook ejecutado como artefacto
      if: always() # Se ejecuta aunque el paso anterior falle, para que puedas ver el error
      uses: actions/upload-artifact@v4
      with:
        name: resultado-notebook
        path: resultado_ejecucion.ipynb
